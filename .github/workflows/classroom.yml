        CHAIN-REMOVE-HEAD_RESULTS: "${{steps.chain-remove-head.outputs.result}}"
        CHAIN-REMOVE-ONLY_RESULTS: "${{steps.chain-remove-only.outputs.result}}"
        CHAIN-LF-EMPTY_RESULTS: "${{steps.chain-lf-empty.outputs.result}}"
        CHAIN-LF-INSERTS_RESULTS: "${{steps.chain-lf-inserts.outputs.result}}"
        CHAIN-RESIZE-TRIGGER_RESULTS: "${{steps.chain-resize-trigger.outputs.result}}"
        CHAIN-RESIZE-PRESERVE_RESULTS: "${{steps.chain-resize-preserve.outputs.result}}"
        CHAIN-PRINT-EMPTY_RESULTS: "${{steps.chain-print-empty.outputs.result}}"
        CHAIN-PRINT-ENTRIES_RESULTS: "${{steps.chain-print-entries.outputs.result}}"
        CHAIN-PRINT-FORMAT_RESULTS: "${{steps.chain-print-format.outputs.result}}"
        PROBE-CTOR-DEFAULT_RESULTS: "${{steps.probe-ctor-default.outputs.result}}"
        PROBE-INSERT-SINGLE_RESULTS: "${{steps.probe-insert-single.outputs.result}}"
        PROBE-INSERT-MULTIPLE_RESULTS: "${{steps.probe-insert-multiple.outputs.result}}"
        PROBE-INSERT-DUP_RESULTS: "${{steps.probe-insert-dup.outputs.result}}"
        PROBE-INSERT-COLLISION_RESULTS: "${{steps.probe-insert-collision.outputs.result}}"
        PROBE-SEARCH-FOUND_RESULTS: "${{steps.probe-search-found.outputs.result}}"
        PROBE-SEARCH-MISSING_RESULTS: "${{steps.probe-search-missing.outputs.result}}"
        PROBE-SEARCH-EMPTY_RESULTS: "${{steps.probe-search-empty.outputs.result}}"
