name: Autograding Tests
on:
  - push
  - repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Project
      continue-on-error: true
      run: |
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Build Check
      id: build
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Build Check
        setup-command: ''
        command: |
          if [ -f build/run_tests ]; then
            echo "Build successful"
          else
            echo "Build failed" && exit 1
          fi
        timeout: 10
        max-score: 0

    - name: "Chaining: Constructor Default Capacity (3 points)"
      id: chain-ctor-default
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Chaining: Constructor Default Capacity (3 points)"
        setup-command: ''
        command: |
          if [ -f build/run_tests ]; then
            cd build && ./run_tests --gtest_filter=ChainingTest.ConstructorDefaultCapacity
          else
            exit 1
          fi
        timeout: 10
        max-score: 3

    - name: "Chaining: Constructor Custom Capacity (2 points)"
      id: chain-ctor-custom
